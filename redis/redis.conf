# Redis configuration for WikiRAG cache

# Limit memory to 512 MB — evict least-recently-used keys when full.
# This protects the host if chunk cache grows unexpectedly large.
maxmemory 512mb
maxmemory-policy allkeys-lru

# Disable persistence — this is a pure cache, we never need durability.
save ""
appendonly no

# Accept connections from any interface inside the Docker network
bind 0.0.0.0
protected-mode no
