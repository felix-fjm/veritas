services:

  # ── Shared infrastructure ────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant/config.yaml:/qdrant/config/production.yaml:ro
    ports:
      - "6333:6333"   # REST API (also used by smoke-test)
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:alpine
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  embedder:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama       # persist downloaded model weights
      - ./embedder/pull_model.sh:/pull_model.sh:ro
    entrypoint: ["/bin/sh", "/pull_model.sh"]
    ports:
      - "11434:11434"
    healthcheck:
      # Healthy once the model appears in the tag list
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags | grep -q nomic-embed-text"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s   # model pull can take a while on first boot
    restart: unless-stopped

  # ── Application containers (Phase 2 & 3) ────────────────────────────────────

  worker:
    build: ./worker
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
      embedder:
        condition: service_healthy
    restart: on-failure

  api:
    build: ./api
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedder:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

volumes:
  qdrant_storage:   # persists 15–20 GB vector index across restarts
  ollama_models:    # persists nomic-embed-text model weights across restarts
