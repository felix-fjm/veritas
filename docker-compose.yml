services:

  # ── Shared infrastructure ────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant/config.yaml:/qdrant/config/production.yaml:ro
    ports:
      - "6333:6333"   # REST API (also used by smoke-test)
      - "6334:6334"   # gRPC
    healthcheck:
      disable: true
    restart: unless-stopped

  redis:
    image: redis:alpine
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  embedder:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama       # persist downloaded model weights
      - ./embedder/pull_model.sh:/pull_model.sh:ro
    entrypoint: ["/bin/sh", "/pull_model.sh"]
    environment:
      - OLLAMA_NUM_CTX=8192
    ports:
      - "11434:11434"
    healthcheck:
      disable: true
    restart: unless-stopped

  # ── Application containers (Phase 2 & 3) ────────────────────────────────────

  worker:
    build: 
      context: ./worker
    platform: linux/amd64
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
      embedder:
        condition: service_started
    volumes:
      - wiki_dump:/data    # persists the 22 GB compressed dump across restarts
    restart: on-failure

  api:
    build:
      context: ./api
    platform: linux/amd64
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      embedder:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

volumes:
  qdrant_storage:   # persists 15–20 GB vector index across restarts
  ollama_models:    # persists nomic-embed-text model weights across restarts
  wiki_dump:        # persists the 22 GB compressed Cirrus dump across restarts
